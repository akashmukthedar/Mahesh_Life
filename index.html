<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mahesh Biradar</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI', sans-serif;
}

body{
background:#0f0f0f;
color:#fff;
overflow-x:hidden;
}

/* HERO */
header{
height:90vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1519741497674-611481863552");
background-size:cover;
}

header h1{
font-size:40px;
}

header p{
margin-top:10px;
}

/* SECTION */
.section{
padding:50px 20px;
text-align:center;
}

/* 🔥 SWIPE GALLERY */
.gallery{
display:flex;
overflow-x:auto;
gap:15px;
padding:20px;
scroll-snap-type:x mandatory;
}

.gallery::-webkit-scrollbar{
display:none;
}

.card{
min-width:80%;
scroll-snap-align:center;
background:#1a1a1a;
border-radius:15px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

.card img{
width:100%;
height:400px;
object-fit:contain;
background:black;
}

/* POPUP IMAGE */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
z-index:1000;
}

.popup img{
width:90%;
max-height:90%;
}

/* INVITATION POPUP */
.invite{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
justify-content:center;
align-items:center;
z-index:2000;
}

.invite-box{
background:#fff;
color:#000;
padding:30px;
border-radius:15px;
text-align:center;
width:90%;
max-width:350px;
}

.btn{
margin-top:15px;
padding:10px 20px;
background:#e74c3c;
border:none;
color:white;
border-radius:20px;
cursor:pointer;
}

/* CARTOON */
.cartoon{
margin-top:30px;
background:#1a1a1a;
padding:20px;
border-radius:15px;
}

.cartoon img{
width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<!-- 💌 INVITATION -->
<div class="invite" id="invite">
<div class="invite-box">

<h2>Wedding Invitation</h2>

<p style="margin-top:10px;">
Together with their families,<br><br>
Mahesh Biradar<br>
&<br>
Nikita<br><br>
invite you to celebrate their wedding.
</p>

<button class="btn" onclick="closeInvite()">Enter</button>

</div>
</div>

<header>

<h1>Mahesh Biradar</h1>
<p>A Journey & A New Beginning with Nikita</p>

</header>

<div class="section">

<h2>Moments</h2>

<div class="gallery">

<div class="card">
<img src="IMG_3559.jpeg" onclick="openImage(this)">
</div>

<div class="card">
<img src="IMG_6289.jpeg" onclick="openImage(this)">
</div>

</div>

</div>

<!-- FULL SCREEN IMAGE -->
<div class="popup" id="popup" onclick="closeImage()">
<img id="popupImg">
</div>

<div class="section">

<h2>The Groom</h2>

<div class="cartoon">

<img src="cartoon.PNG">

<p style="margin-top:10px;">
A new chapter begins with Nikita —
built on trust and love.
</p>

</div>

</div>

<script>

// CLOSE INVITE
function closeInvite(){
document.getElementById("invite").style.display="none";
}

// IMAGE POPUP
function openImage(img){
document.getElementById("popup").style.display="flex";
document.getElementById("popupImg").src = img.src;
}

function closeImage(){
document.getElementById("popup").style.display="none";
}

</script>

</body>

</html>
